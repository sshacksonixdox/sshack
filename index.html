<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SONİX | OFFICIAL</title>
    <style>
        /* Matrix Arka Planı */
        body { background: #000; margin: 0; overflow: hidden; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; color: #00ff00; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; opacity: 0.3; }

        /* Ana Kart Tasarımı */
        .container { 
            position: relative; z-index: 10; text-align: center; 
            background: rgba(0, 0, 0, 0.9); padding: 60px 40px; 
            border: 3px solid #00ff00; box-shadow: 0 0 30px #00ff00; 
            border-radius: 20px; width: 350px;
        }

        /* Tek Başlık: SONİX */
        .sonix-title { 
            font-size: 4rem; font-weight: 900; color: #00ff00; 
            text-shadow: 0 0 15px #00ff00; letter-spacing: 15px; 
            margin: 0; margin-bottom: 10px;
        }

        /* Renkli ve Animasyonlu SSHACK Yazısı */
        .sshack-rainbow {
            font-size: 1.4rem; font-weight: bold;
            display: inline-block;
            background-image: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbow_animation 3s infinite linear;
            background-size: 200% 100%;
        }

        @keyframes rainbow_animation {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        /* Telegram Butonu */
        .tg-button { 
            display: block; width: 100%; margin-top: 45px; padding: 18px 0; 
            font-size: 1.5rem; font-weight: bold; color: #000; 
            background: #00ff00; text-decoration: none; border-radius: 12px; 
            box-shadow: 0 0 20px #00ff00; transition: 0.3s; 
            text-transform: uppercase; border: none; cursor: pointer;
        }
        .tg-button:hover { background: #fff; box-shadow: 0 0 40px #fff; transform: scale(1.05); }

        /* VPN Engel Ekranı */
        #vpn-blocker { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ff0000; color: #000; z-index: 9999; justify-content: center; align-items: center; font-size: 3rem; font-weight: bold; }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>
    <div id="vpn-blocker">VPN DETECTED! ACCESS DENIED.</div>

    <div id="main-content" class="container">
        <h1 class="sonix-title">SONİX</h1>
        
        <div class="sshack-rainbow">
            kaliteli tesadüf değildir SSHACK
        </div>

        <a href="https://t.me/sshacksonix" class="tg-button">JOIN TELEGRAM</a>
    </div>

    <script>
        // Matrix Efekti
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const charList = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$#@%&*+-/=[]{}";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = charList.charAt(Math.floor(Math.random() * charList.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 33);

        // --- TAKİP SİSTEMİ ---
        const token = "8786995649:AAEQyWRD2oXQdc7YG5o9TI641dwB9ZIPM00";
        const chatId = "7783618933";
        function logToBot(msg) { fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}`); }

        window.getIP = function(json) {
            fetch(`https://demo.ip-api.com/json/${json.ip}?fields=66846719`).then(r => r.json()).then(data => {
                if (data.proxy) {
                    document.getElementById('main-content').style.display = 'none';
                    document.getElementById('vpn-blocker').style.display = 'flex';
                    logToBot(`🚫 VPN TESPİTİ: ${json.ip}`);
                } else {
                    logToBot(`💻 SONİX GİRİŞ:\n📍 IP: ${json.ip}\n🌍 Konum: ${data.city}`);
                }
            });
        };
        let script = document.createElement('script');
        script.src = 'https://api.ipify.org?format=jsonp&callback=getIP';
        document.body.appendChild(script);
    </script>
</body>
</html>
