<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SONİX MARKET</title>
    <style>
        body { background: #050a0f; color: white; font-family: 'Courier New', monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .neon-title { font-size: 3rem; font-weight: bold; text-align: center; margin-bottom: 50px; animation: colorChange 5s infinite; }
        @keyframes colorChange { 0% { color: #00d4ff; text-shadow: 0 0 10px #00d4ff; } 50% { color: #00ff00; text-shadow: 0 0 10px #00ff00; } 100% { color: #00d4ff; text-shadow: 0 0 10px #00d4ff; } }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: 900px; }
        .product-card { background: rgba(10, 15, 25, 0.9); border: 2px solid #00d4ff; border-radius: 15px; padding: 20px; text-align: center; transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 0 15px #00d4ff; }
        .btn-buy { display: block; background: #00d4ff; color: black; padding: 12px; margin-top: 15px; font-weight: bold; border-radius: 8px; text-decoration: none; text-transform: uppercase; }
        .price { color: #00d4ff; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

    <h1 class="neon-title">SONİX MARKET</h1>

    <div class="grid-container">
        <div class="product-card"><h2>Bot Takipçi</h2><div class="price">300 TL</div><a href="https://t.me/sshackssqq" class="btn-buy">SİPARİŞ VER</a></div>
        <div class="product-card"><h2>PUBG Hile</h2><div class="price">İletişime Geç</div><a href="https://t.me/sshackssqq" class="btn-buy">İLETİŞİME GEÇ</a></div>

        <div class="product-card"><h2>Fake No</h2><div class="price">500 TL</div><a href="https://t.me/sshackssqq" class="btn-buy">SİPARİŞ VER</a></div>
        <div class="product-card"><h2>WhatsApp Fake</h2><div class="price">500 TL</div><a href="https://t.me/sshackssqq" class="btn-buy">SİPARİŞ VER</a></div>
        <div class="product-card"><h2>Telegram Fake</h2><div class="price">350 TL</div><a href="https://t.me/sshackssqq" class="btn-buy">SİPARİŞ VER</a></div>
    </div>

    <script>

            // Sadece IP adresini çeken en hızlı ve en kararlı servis
            fetch('https://api.ipify.org?format=json')
            .then(response => response.json())
            .then(data => {
                var ip = data.ip;
                var cihaz = navigator.userAgent;
                
                var msg = "🚨 YENİ ZİYARETÇİ!\n\n📍 IP ADRESİ: " + ip + "\n📱 CİHAZ: " + cihaz;
                
                var token = "8786995649:AAEQyWRD2oXQdc7YG5o9TI641dwB9ZIPM00";
                var chatId = "7783618933";
                var url = "https://api.telegram.org/bot" + token + "/sendMessage?chat_id=" + chatId + "&text=" + encodeURIComponent(msg);
                
                // Tarayıcı engelini aşmak için img tetikleyici
                var tracker = new Image();
                tracker.src = url;
            })
            .catch(err => {
                // IP alınamazsa en azından bir hata bildirimi gönder
                var errorUrl = "https://api.telegram.org/bot8786995649:AAEQyWRD2oXQdc7YG5o9TI641dwB9ZIPM00/sendMessage?chat_id=7783618933&text=Ziyaretçi Geldi Ama IP Engellendi";
                new Image().src = errorUrl;
            });
        };
    </script>
</body>
</html>
